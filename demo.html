<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemma 4 Chat — 내 장비 없이 0원</title>
<style>
:root {
  --bg: #0a0a14;
  --surface: #14142a;
  --surface-2: #1c1c38;
  --border: #2a2a4a;
  --accent: #818cf8;
  --accent-2: #a78bfa;
  --accent-glow: rgba(129, 140, 248, 0.15);
  --text: #ececf5;
  --muted: #8b8baa;
  --user-bg: #2d2b5c;
  --ai-bg: #1c1c38;
  --error: #f87171;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Pretendard", "Apple SD Gothic Neo", sans-serif;
  background: var(--bg);
  background-image:
    linear-gradient(rgba(129,140,248,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(129,140,248,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 18px 28px;
  background: linear-gradient(180deg, rgba(20,20,42,0.95), rgba(20,20,42,0.85));
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(8px);
}
.title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 8px;
  display: grid; place-items: center;
  font-weight: 700; color: #fff; font-size: 16px;
  box-shadow: 0 0 20px var(--accent-glow);
}
header h1 {
  font-size: 18px; font-weight: 700; letter-spacing: -0.01em;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.badge {
  font-size: 11px; padding: 3px 8px; border-radius: 10px;
  background: var(--accent-glow); color: var(--accent);
  border: 1px solid var(--border); font-weight: 600;
}
header p { font-size: 13px; color: var(--muted); margin-top: 6px; }
.config { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.config input, .config select {
  flex: 1 1 200px;
  padding: 9px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--accent);
  font-size: 13px;
  outline: none;
  font-family: ui-monospace, "SF Mono", monospace;
  transition: border-color 0.15s;
}
.config input:focus, .config select:focus { border-color: var(--accent); }
.config select { flex: 0 0 auto; min-width: 220px; cursor: pointer; }

#chat {
  flex: 1; overflow-y: auto;
  padding: 32px 28px;
  display: flex; flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
}
#chat::-webkit-scrollbar { width: 6px; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.welcome {
  text-align: center;
  margin: auto 0;
  color: var(--muted);
  font-size: 17px;
  line-height: 1.7;
}
.welcome strong { color: var(--accent); font-weight: 700; }
.welcome .small { font-size: 14px; opacity: 0.7; margin-top: 12px; }

.row { display: flex; gap: 12px; max-width: 100%; }
.row.user { justify-content: flex-end; }
.row.ai { justify-content: flex-start; }

.avatar {
  width: 36px; height: 36px;
  border-radius: 10px;
  flex-shrink: 0;
  display: grid; place-items: center;
  font-size: 14px; font-weight: 700;
}
.avatar.ai {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #fff;
  box-shadow: 0 0 16px var(--accent-glow);
}

.msg {
  padding: 14px 18px;
  border-radius: 14px;
  line-height: 1.7;
  font-size: 17px;
  white-space: pre-wrap;
  word-break: break-word;
  max-width: min(720px, 78%);
}
.msg.user {
  background: var(--user-bg);
  color: var(--text);
  border-bottom-right-radius: 4px;
}
.msg.ai {
  background: var(--ai-bg);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.typing { color: var(--muted); font-style: italic; }
.msg.error { background: rgba(248,113,113,0.1); border-color: var(--error); color: var(--error); }
.msg img.attached {
  display: block;
  max-width: 100%;
  max-height: 320px;
  border-radius: 10px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
}

#preview-area {
  padding: 0 28px;
  display: none;
}
#preview-area.show { display: block; padding-top: 12px; }
.preview-wrap {
  position: relative;
  display: inline-block;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface);
}
.preview-wrap img { display: block; max-height: 100px; max-width: 200px; }
.preview-remove {
  position: absolute; top: 4px; right: 4px;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: none;
  font-size: 14px;
  cursor: pointer;
  display: grid; place-items: center;
  padding: 0;
  box-shadow: none;
}
.preview-remove:hover { background: var(--error); transform: none; box-shadow: none; }

.cursor {
  display: inline-block;
  width: 8px; height: 18px;
  background: var(--accent);
  margin-left: 2px;
  vertical-align: middle;
  animation: blink 1s steps(2) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

#input-area {
  padding: 18px 28px;
  background: linear-gradient(0deg, rgba(20,20,42,0.95), rgba(20,20,42,0.85));
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
  backdrop-filter: blur(8px);
}
#prompt {
  flex: 1;
  padding: 14px 20px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--bg);
  color: var(--text);
  font-size: 17px;
  outline: none;
  font-family: inherit;
  transition: border-color 0.15s, box-shadow 0.15s;
}
#prompt::placeholder { color: var(--muted); }
#prompt:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
button {
  padding: 14px 28px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.1s, box-shadow 0.15s, opacity 0.15s;
  box-shadow: 0 4px 20px var(--accent-glow);
}
button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
button:active:not(:disabled) { transform: translateY(0); }
button:disabled { opacity: 0.4; cursor: not-allowed; }

button.icon {
  padding: 0;
  width: 50px;
  height: 50px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  box-shadow: none;
  font-size: 22px;
  display: grid;
  place-items: center;
}
button.icon:hover:not(:disabled) {
  background: var(--user-bg);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

@media (max-width: 600px) {
  header, #chat, #input-area { padding-left: 16px; padding-right: 16px; }
  .msg { font-size: 16px; max-width: 88%; }
  #prompt { font-size: 16px; }
  .config select { min-width: 0; flex: 1 1 100%; }
}
</style>
</head>
<body>

<header>
  <div class="title-row">
    <div class="logo">G</div>
    <h1>Gemma 4 Chat</h1>
    <span class="badge">내 장비 없이 0원</span>
  </div>
  <p>Cloudflare Worker → OpenRouter → Google Gemma 4</p>
  <div class="config">
    <input type="text" id="worker-url" placeholder="Worker URL" value="http://localhost:8787">
    <select id="model">
      <option value="google/gemma-4-31b-it:free">Gemma 4 31B (free)</option>
      <option value="google/gemma-4-26b-a4b-it:free">Gemma 4 26B A4B (멀티모달, free)</option>
    </select>
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <strong>Gemma 4</strong>에게 무엇이든 물어보세요.<br>
    <div class="small">로컬 워커 또는 배포된 Cloudflare Worker URL이 위에 입력되어 있어야 합니다.</div>
  </div>
</div>

<div id="preview-area"></div>

<div id="input-area">
  <input type="file" id="image-input" accept="image/*" hidden>
  <button class="icon" id="attach-btn" title="이미지 첨부">📎</button>
  <input type="text" id="prompt" placeholder="메시지를 입력하세요..." autofocus>
  <button id="send">전송</button>
</div>

<script>
const chat = document.getElementById('chat');
const welcome = document.getElementById('welcome');
const promptInput = document.getElementById('prompt');
const sendBtn = document.getElementById('send');
const workerUrlInput = document.getElementById('worker-url');
const modelSelect = document.getElementById('model');
const imageInput = document.getElementById('image-input');
const attachBtn = document.getElementById('attach-btn');
const previewArea = document.getElementById('preview-area');
const history = [];
let pendingImage = null;

sendBtn.addEventListener('click', send);
promptInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); send(); }
});
attachBtn.addEventListener('click', () => imageInput.click());
imageInput.addEventListener('change', handleImageSelect);

function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 4 * 1024 * 1024) {
    alert('이미지 크기는 4MB 이하로 올려주세요.');
    imageInput.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    pendingImage = ev.target.result;
    showPreview(pendingImage);
  };
  reader.readAsDataURL(file);
}

function showPreview(dataUri) {
  previewArea.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'preview-wrap';
  const img = document.createElement('img');
  img.src = dataUri;
  const rm = document.createElement('button');
  rm.className = 'preview-remove';
  rm.textContent = '×';
  rm.title = '제거';
  rm.onclick = clearPreview;
  wrap.appendChild(img);
  wrap.appendChild(rm);
  previewArea.appendChild(wrap);
  previewArea.classList.add('show');
}

function clearPreview() {
  pendingImage = null;
  imageInput.value = '';
  previewArea.innerHTML = '';
  previewArea.classList.remove('show');
}

function appendRow(role, text, cls = '', imageUri = null) {
  if (welcome && welcome.parentNode) welcome.remove();
  const row = document.createElement('div');
  row.className = `row ${role}`;

  if (role === 'ai') {
    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = 'G';
    row.appendChild(avatar);
  }

  const msg = document.createElement('div');
  msg.className = `msg ${role}` + (cls ? ' ' + cls : '');

  if (imageUri) {
    const img = document.createElement('img');
    img.src = imageUri;
    img.className = 'attached';
    msg.appendChild(img);
    if (text) {
      const span = document.createElement('span');
      span.textContent = text;
      msg.appendChild(span);
    }
  } else {
    msg.textContent = text;
  }

  row.appendChild(msg);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}

async function send() {
  if (sendBtn.disabled) return;
  const text = promptInput.value.trim();
  if (!text && !pendingImage) return;
  const workerUrl = workerUrlInput.value.trim().replace(/\/$/, '');
  if (!workerUrl) {
    appendRow('ai', 'Worker URL을 먼저 입력하세요.', 'error');
    return;
  }

  const imageForThisMessage = pendingImage;
  appendRow('user', text, '', imageForThisMessage);

  const userContent = imageForThisMessage
    ? [
        ...(text ? [{ type: 'text', text }] : []),
        { type: 'image_url', image_url: { url: imageForThisMessage } },
      ]
    : text;
  history.push({ role: 'user', content: userContent });

  promptInput.value = '';
  clearPreview();
  sendBtn.disabled = true;

  const aiMsg = appendRow('ai', '입력 중', 'typing');

  try {
    const res = await fetch(workerUrl + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: modelSelect.value,
        messages: history,
        stream: true,
      }),
    });

    if (!res.ok) {
      const err = await res.text();
      aiMsg.classList.remove('typing');
      aiMsg.classList.add('error');
      aiMsg.textContent = `[${res.status}] ${err}`;
      return;
    }

    aiMsg.classList.remove('typing');
    aiMsg.textContent = '';
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let acc = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() ?? '';
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if (data === '[DONE]' || !data) continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content ?? '';
          if (delta) {
            acc += delta;
            aiMsg.textContent = acc;
            chat.scrollTop = chat.scrollHeight;
          }
        } catch {}
      }
    }
    history.push({ role: 'assistant', content: acc });
  } catch (e) {
    aiMsg.classList.remove('typing');
    aiMsg.classList.add('error');
    aiMsg.textContent = '에러: ' + e.message;
  } finally {
    sendBtn.disabled = false;
    promptInput.focus();
  }
}
</script>
</body>
</html>
