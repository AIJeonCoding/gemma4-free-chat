<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemma 4 Chat — 0원 챗봇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
header { padding: 16px 24px; background: #16213e; border-bottom: 1px solid #0f3460; }
header h1 { font-size: 18px; color: #e94560; }
header p { font-size: 12px; color: #888; margin-top: 4px; }
#chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.user { align-self: flex-end; background: #0f3460; }
.ai { align-self: flex-start; background: #16213e; border: 1px solid #0f3460; }
.typing { color: #888; font-style: italic; }
.error { background: #4a1f2e !important; border-color: #e94560 !important; }
#input-area { padding: 16px 24px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 12px; }
#prompt { flex: 1; padding: 12px 16px; border: 1px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #eee; font-size: 15px; outline: none; }
#prompt:focus { border-color: #e94560; }
button { padding: 12px 24px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.config { display: flex; gap: 8px; margin-top: 8px; }
.config input, .config select { flex: 1; padding: 8px 12px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #e94560; font-size: 13px; outline: none; }
.config select { flex: 0 0 auto; min-width: 220px; }
</style>
</head>
<body>

<header>
  <h1>Gemma 4 Chat — 내 장비 없이 0원</h1>
  <p>Cloudflare Worker → OpenRouter → Google Gemma 4</p>
  <div class="config">
    <input type="text" id="worker-url" placeholder="Worker URL (예: https://gemma-proxy.xxx.workers.dev)" value="http://localhost:8787">
    <select id="model">
      <option value="google/gemma-4-31b-it:free">Gemma 4 31B (free)</option>
      <option value="google/gemma-4-26b-a4b-it:free">Gemma 4 26B A4B (free, 멀티모달)</option>
    </select>
  </div>
</header>

<div id="chat"></div>

<div id="input-area">
  <input type="text" id="prompt" placeholder="메시지를 입력하세요..." autofocus>
  <button id="send">전송</button>
</div>

<script>
const chat = document.getElementById('chat');
const promptInput = document.getElementById('prompt');
const sendBtn = document.getElementById('send');
const workerUrlInput = document.getElementById('worker-url');
const modelSelect = document.getElementById('model');
const history = [];

sendBtn.addEventListener('click', send);
promptInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); send(); }
});

function appendMessage(role, text, cls = '') {
  const div = document.createElement('div');
  div.className = `msg ${role}` + (cls ? ' ' + cls : '');
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  if (sendBtn.disabled) return;
  const text = promptInput.value.trim();
  if (!text) return;
  const workerUrl = workerUrlInput.value.trim().replace(/\/$/, '');
  if (!workerUrl) {
    appendMessage('ai', 'Worker URL을 먼저 입력하세요.', 'error');
    return;
  }

  appendMessage('user', text);
  history.push({ role: 'user', content: text });
  promptInput.value = '';
  sendBtn.disabled = true;

  const aiDiv = appendMessage('ai', '...', 'typing');

  try {
    const res = await fetch(workerUrl + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: modelSelect.value,
        messages: history,
        stream: true,
      }),
    });

    if (!res.ok) {
      const err = await res.text();
      aiDiv.classList.remove('typing');
      aiDiv.classList.add('error');
      aiDiv.textContent = `[${res.status}] ${err}`;
      return;
    }

    aiDiv.classList.remove('typing');
    aiDiv.textContent = '';
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let acc = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() ?? '';
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if (data === '[DONE]' || !data) continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content ?? '';
          if (delta) {
            acc += delta;
            aiDiv.textContent = acc;
            chat.scrollTop = chat.scrollHeight;
          }
        } catch {}
      }
    }
    history.push({ role: 'assistant', content: acc });
  } catch (e) {
    aiDiv.classList.remove('typing');
    aiDiv.classList.add('error');
    aiDiv.textContent = '에러: ' + e.message;
  } finally {
    sendBtn.disabled = false;
    promptInput.focus();
  }
}
</script>
</body>
</html>
